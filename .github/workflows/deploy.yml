name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Manual re-deploy from the Actions tab.
  workflow_dispatch:

# Least privilege for the official Pages deploy flow.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds with `astro build` and uploads the GitHub Pages artifact.
      # `astro build` derives the correct base path from astro.config.mjs.
      - name: Build site
        uses: withastro/action@v3
        with:
          node-version: 20

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
