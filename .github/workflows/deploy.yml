name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  # Manual re-deploy from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

# One in-flight deploy at a time; don't cancel a publish midway.
concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Builds with `astro build` (runs the `prebuild` icon generation first). SITE_URL /
      # BASE_PATH derive the canonical/OG/hreflang/sitemap URLs (astro.config.mjs); unset
      # repo variables fall back to the mentara.ai defaults there. See README → Custom
      # domain / Firebase Hosting for pointing this at a different project or domain.
      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}

      # Requires a repo secret FIREBASE_SERVICE_ACCOUNT holding a Firebase service-account
      # JSON key (Firebase console → Project settings → Service accounts → Generate new
      # private key). This repo is public – that key must live ONLY in GitHub Actions
      # secrets, never committed. Set the real project id in .firebaserc first.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: default
          channelId: live

  # Quality gate – independent of deploy on purpose: a Lighthouse dip must never block a
  # publish. Assertions are warnings (see lighthouserc.json).
  audit:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build base-less so Lighthouse CI's static server (serves dist at "/") gets a
      # self-consistent site; the base path doesn't affect the audited scores.
      - name: Build (no base)
        run: npm run build
        env:
          BASE_PATH: /

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
