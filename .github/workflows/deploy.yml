name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Manual re-deploy from the Actions tab.
  workflow_dispatch:

# Least privilege for the official Pages deploy flow.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds with `astro build` (runs `prebuild` icon generation) and uploads the
      # GitHub Pages artifact. `astro build` derives the base path from astro.config.mjs.
      - name: Build site
        uses: withastro/action@v3
        with:
          node-version: 20

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Quality gate — independent of deploy on purpose: a Lighthouse dip must never block a
  # publish. Assertions are warnings (see lighthouserc.json).
  audit:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build base-less so Lighthouse CI's static server (serves dist at "/") gets a
      # self-consistent site; the base path doesn't affect the audited scores.
      - name: Build (no base)
        run: npm run build
        env:
          BASE_PATH: /

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
